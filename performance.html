<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>스푼랩스의 성과관리 · Performance Review</title>

<!-- 폰트: 표지/제목은 묵직한 산세리프(템플릿의 굵은 헤드라인 느낌), 본문은 Pretendard 계열 -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">

<style>
/* =====================================================================
   SpoonLabs typeA-Graphic  ·  Performance Review 강의 덱
   디자인 토큰 — 템플릿(흑/백, 굵은 헤드라인, 우측 그래픽 밴드)에서 추출
   ===================================================================== */
:root{
  --ink:        #111111;   /* 본문/제목 검정 */
  --ink-soft:   #6b6b6b;   /* 본문 회색 (템플릿 placeholder 톤) */
  --line:       #e6e6e6;   /* 옅은 구분선 */
  --paper:      #ffffff;   /* 기본 배경 */
  --paper-2:    #f5f5f5;   /* 보조 배경(표 헤더 등) */
  --black:      #0b0b0b;   /* 표지/마무리 검정 패널 */
  --accent:     #ff2d8e;   /* 포인트(스타버스트 핑크) — 아주 절제해서만 사용 */
  --accent-2:   #16d2c3;   /* 보조 포인트(틸) */
  --ok:         #1aa64b;
  --no:         #e23a3a;
  --maxw:       1280px;    /* 슬라이드 기준 폭 (16:9) */
  --pad:        72px;
  --font-head:  "Archivo","Pretendard",sans-serif;
  --font-body:  "Pretendard","Archivo",sans-serif;
}

*{ box-sizing:border-box; margin:0; padding:0; }
html,body{ height:100%; }

/* ── 줄바꿈: 단어를 글자 중간에서 쪼개지 않고 통째로 다음 줄로 넘김 ──
   keep-all : 한국어·중국어·일본어 단어를 끊지 않고, 띄어쓰기 자리에서만 줄바꿈
   break-word: 한 단어가 너무 길어 한 줄에 도저히 안 들어갈 때만 최후수단으로 줄바꿈 */
#deck, #deck *{ word-break:keep-all; overflow-wrap:break-word; }
body{
  font-family:var(--font-body);
  background:#1a1a1a;          /* 무대 바깥(레터박스) */
  color:var(--ink);
  overflow:hidden;
  -webkit-font-smoothing:antialiased;
}

/* ── 무대: 16:9 비율을 유지하며 화면에 맞춰 스케일 ── */
#stage{
  position:fixed; inset:0;
  display:flex; align-items:center; justify-content:center;
}
#deck{
  position:relative;
  width:1280px; height:720px;     /* 16:9 고정 캔버스 */
  background:var(--paper);
  overflow:hidden;
  box-shadow:0 30px 80px rgba(0,0,0,.45);
  transform-origin:center center;
}

/* ── 슬라이드 공통 ── */
.slide{
  position:absolute; inset:0;
  padding:var(--pad);
  display:none;
  flex-direction:column;
  animation:fade .45s ease both;
}
.slide.active{ display:flex; }
@keyframes fade{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:none;} }

/* ── 클릭 점진적 노출(progressive reveal) ── */
.slide[data-reveal] [data-rev]{
  opacity:0;
  transform:translateX(34px);
  visibility:hidden;
  transition:opacity .42s cubic-bezier(.22,.61,.36,1),
             transform .42s cubic-bezier(.22,.61,.36,1);
}
.slide[data-reveal] [data-rev].shown{
  opacity:1;
  transform:none;
  visibility:visible;
}
/* 표 행/셀은 transform 대신 페이드만(레이아웃 보존) */
.slide[data-reveal] tr[data-rev],
.slide[data-reveal] td[data-rev],
.slide[data-reveal] th[data-rev]{
  transform:none;
}
/* 리스트 항목은 살짝만 슬라이드 */
.slide[data-reveal] li[data-rev]{
  transform:translateX(24px);
}

/* 상/하단 브랜드 바 (모든 슬라이드 공통, 템플릿과 동일 위치) */
.brand-top, .brand-bot{
  position:absolute; left:var(--pad); right:var(--pad);
  display:flex; align-items:center; justify-content:space-between;
  font-family:var(--font-head); font-weight:700; letter-spacing:.02em;
  font-size:13px; color:var(--ink);
  pointer-events:none; z-index:5;
}
.brand-top{ top:26px; }
.brand-bot{ bottom:26px; font-size:11px; color:#9a9a9a; font-weight:600; }
/* 상단 우측 로고 (Spoon + VIGLOO) */
.brand-logos{ display:flex; align-items:center; gap:14px; }
.brand-logos img{ display:block; width:auto; }
.brand-logos .logo-spoon{ height:20px; }
.brand-logos .logo-vigloo{ height:15px; }

/* 슬라이드가 검정 패널일 때 브랜드 바를 흰색으로 */
.slide.on-black ~ .brand-top,
.slide.on-black ~ .brand-bot{ color:#fff; }
body.dark .brand-top{ color:#fff; }
body.dark .brand-bot{ color:rgba(255,255,255,.55); }

/* ── 제목 영역 ── */
.eyebrow{
  font-family:var(--font-head); font-weight:700;
  font-size:13px; letter-spacing:.06em; text-transform:none;
  color:var(--ink-soft); margin-bottom:14px;
}
.num-title{ display:flex; align-items:baseline; gap:18px; }
.num{
  font-family:var(--font-head); font-weight:900;
  font-size:clamp(34px,4vw,46px); line-height:1; color:var(--ink);
}
h1.title{
  font-family:var(--font-head); font-weight:800;
  font-size:clamp(30px,3.4vw,44px); line-height:1.12; color:var(--ink);
  letter-spacing:-.01em;
}
h1.title .br{ display:block; }

/* ── 본문 콘텐츠 컬럼 ── */
.content-wrap{ display:flex; flex-direction:column; gap:18px; margin-top:26px; flex:1; min-height:0; }
.body{ font-size:18px; line-height:1.6; color:var(--ink); max-width:62ch; }
.body.narrow{ max-width:52ch; }
p.lead{ font-size:21px; line-height:1.55; font-weight:600; color:var(--ink); max-width:60ch; }
p.bighead{ font-size:26px; line-height:1.4; font-weight:800; color:var(--accent); max-width:60ch; }
p.para{ font-size:17.5px; line-height:1.62; color:#222; margin-bottom:2px; max-width:64ch; }
.note{ font-size:14px; line-height:1.55; color:var(--ink-soft); max-width:70ch; }
.note.wide{ max-width:none; white-space:nowrap; }

/* 목록 */
ul.list, ol.olist{ padding-left:0; list-style:none; display:flex; flex-direction:column; gap:11px; max-width:66ch; }
ul.list li, ol.olist li{ position:relative; padding-left:30px; font-size:17px; line-height:1.55; color:#222; }
ul.list li::before{ content:""; position:absolute; left:6px; top:.62em; width:7px; height:7px; background:var(--ink); border-radius:50%; }
ol.olist{ counter-reset:olist; }
ol.olist li{ counter-increment:olist; }
ol.olist li::before{
  content:counter(olist); position:absolute; left:0; top:.05em;
  width:22px; height:22px; background:var(--ink); color:#fff; border-radius:50%;
  font-family:var(--font-head); font-weight:700; font-size:12px;
  display:flex; align-items:center; justify-content:center;
}

/* 강조 박스 (콜아웃) */
.callout{
  display:flex; gap:14px; align-items:flex-start;
  background:var(--paper-2); border:1px solid var(--line);
  border-left:4px solid var(--ink);
  border-radius:10px; padding:16px 18px;
  font-size:16px; line-height:1.55; color:#1d1d1d; max-width:74ch;
}
.callout .ico{ font-size:20px; line-height:1.2; flex-shrink:0; }

/* 인용 */
blockquote.q{
  border-left:3px solid var(--accent);
  padding:6px 0 6px 20px; margin-top:4px;
  font-size:19px; line-height:1.5; font-style:italic; color:#1a1a1a; max-width:62ch;
}

/* 표 */
table.tbl{ border-collapse:collapse; width:100%; max-width:100%; font-size:14.5px; }
table.tbl th, table.tbl td{ border:1px solid var(--line); padding:10px 12px; text-align:left; vertical-align:top; line-height:1.45; }
table.tbl th{ background:var(--paper-2); font-family:var(--font-head); font-weight:700; color:#111; font-size:13.5px; }
table.tbl td:first-child{ font-weight:600; color:#111; white-space:nowrap; }
table.tbl.wrapfirst td:first-child{ white-space:normal; }
table.tbl td.nowrapcol, table.tbl th.nowrapcol{ white-space:nowrap; width:1%; text-align:center; }

/* 좌우 대비 카드 (vs) */
.vs{ display:grid; grid-template-columns:1fr 1fr; gap:18px; }
.vs .card{ border:1px solid var(--line); border-radius:12px; overflow:hidden; display:flex; flex-direction:column; }
.vs .card .head{ padding:12px 16px; font-family:var(--font-head); font-weight:700; font-size:14px; line-height:1.35; color:#fff; }
.vs .card.l .head{ background:#3a3a3a; }
.vs .card.r .head{ background:var(--ink); }
.vs .card .items{ padding:14px 16px; display:flex; flex-direction:column; gap:9px; }
.vs .card .items li{ position:relative; list-style:none; padding-left:18px; font-size:14px; line-height:1.5; color:#262626; }
.vs .card .items li::before{ content:""; position:absolute; left:3px; top:.6em; width:5px; height:5px; border-radius:50%; background:#bbb; }
.vs .card.l .items li::before{ background:#9a9a9a; }
.vs .card.r .items li::before{ background:var(--ink); }

/* ── 다이어그램(직접 그린 SVG) ── */
.diagram{ margin:4px auto 0; width:100%; }
.diagram svg{ display:block; width:100%; height:auto; }
.diagram-cap{ margin-top:10px; font-size:13.5px; line-height:1.5; color:var(--ink-soft); text-align:center; }
.diagram-missing{ padding:14px; border:1px dashed #ccc; color:#999; font-size:13px; border-radius:8px; }
/* SVG 내부 공통 토큰 (currentColor/클래스로 색 제어) */
.dg-fill-ink{ fill:var(--ink); }
.dg-stroke-ink{ stroke:var(--ink); }
.dg-label{ font-family:var(--font-head); font-weight:700; }
.dg-sub{ font-family:var(--font-body); }
/* 다이어그램 슬라이드: 본문이 좁아도 다이어그램은 넉넉히 */
.slide.diagram-slide .content-wrap{ margin-top:18px; gap:14px; }
.slide.diagram-slide.has-img .eyebrow,
.slide.diagram-slide.has-img .num-title,
.slide.diagram-slide.has-img .content-wrap{ max-width:100%; padding-right:0; }
/* 텍스트+다이어그램 2단 구성용 */
.split2{ display:grid; grid-template-columns:1.05fr 1fr; gap:34px; align-items:center; }
.split2 .txt{ display:flex; flex-direction:column; gap:13px; }
.split2 .txt .para{ font-size:16px; }
.split2 .txt ul.list li, .split2 .txt ol.olist li{ font-size:15px; }

/* ── 우측 그래픽 밴드 (content 레이아웃) ── */
.slide.has-img .eyebrow,
.slide.has-img .num-title,
.slide.has-img .content-wrap{ max-width:64%; padding-right:18px; }
.slide.has-img .content-wrap .body,
.slide.has-img .content-wrap .lead,
.slide.has-img .content-wrap .para,
.slide.has-img .content-wrap ul.list,
.slide.has-img .content-wrap ol.olist,
.slide.has-img .content-wrap .callout,
.slide.has-img .content-wrap .note,
.slide.has-img .content-wrap table.tbl{ max-width:100%; }
.gfx{
  position:absolute; top:0; right:0; bottom:0; width:34%;
  background:#000; overflow:hidden; z-index:1;
}
.gfx .bg{
  position:absolute; inset:0;
  background-size:cover; background-position:center;
}
.gfx.gfx-svg svg{ position:absolute; inset:0; width:100%; height:100%; display:block; }
.corner-badge{ position:absolute; right:46px; bottom:42px; width:128px; height:128px; z-index:2; pointer-events:none; }
.corner-badge svg{ width:100%; height:100%; display:block; }
.gfx .fade{ /* 좌측 가장자리만 부드럽게 페이드 */
  position:absolute; top:0; bottom:0; left:0; width:90px;
  background:linear-gradient(to right, var(--paper), rgba(255,255,255,0)); z-index:2;
}
/* 콘텐츠가 그래픽 위로 올라오지 않도록 텍스트 레이어를 위에 */
.slide.has-img .eyebrow,
.slide.has-img .num-title,
.slide.has-img .content-wrap{ position:relative; z-index:2; }

/* full-title: 이미지가 있어도 타이틀은 한 줄로 (이미지 밴드는 침범하지 않음) */
.slide.full-title.has-img .num-title{ max-width:64%; padding-right:14px; }
.slide.full-title.has-img .num-title .title{ white-space:nowrap; font-size:clamp(18px,2.05vw,24px); letter-spacing:-.015em; }
.slide.full-title.has-img .num-title .num{ font-size:clamp(26px,3vw,34px); }

/* =====================================================================
   레이아웃별 특수 스타일
   ===================================================================== */

/* 표지 (cover) — 검정 배경 + 그래픽 몽타주 + 하단 화이트 밴드 제목 */
.slide.cover{ padding:0; }
.cover .top-black{ position:absolute; top:0; left:0; right:0; height:62%; background:var(--black); overflow:hidden; }
.cover .top-black .montage{ position:absolute; inset:0; background-size:cover; background-position:center; opacity:.96; }
.cover .top-black .b-top{ position:absolute; top:30px; left:var(--pad); right:var(--pad); display:flex; justify-content:space-between; color:#fff; font-family:var(--font-head); font-weight:700; font-size:13px; z-index:2; }
.cover .bottom-white{ position:absolute; left:0; right:0; bottom:0; height:38%; background:#fff; padding:34px var(--pad); display:flex; flex-direction:column; justify-content:center; }
.cover .c-eyebrow{ font-family:var(--font-head); font-weight:700; font-size:13px; color:var(--ink-soft); margin-bottom:12px; letter-spacing:.04em; }
.cover h1.cover-title{ font-family:var(--font-head); font-weight:900; font-size:clamp(34px,4.4vw,56px); line-height:1.05; color:var(--ink); letter-spacing:-.01em; }
.cover h1.cover-title .br{ display:block; }
.cover .lead-line{ display:none; }  /* 표지 리드는 노트로 하단 표시 안 함(간결) */

/* 강사/안내 (intro) — 좌측 텍스트 + 우측 그래픽(투명 버블), 제목은 좌상단 Bold */
.slide.intro .head-row{ }
.slide.intro h1.title{ font-size:clamp(30px,3.2vw,40px); }

/* 목차 (index) — 좌측 'Index', 우측 번호 리스트(밑줄형) */
.slide.index{ }
.slide.index .index-grid{ display:grid; grid-template-columns:0.8fr 1.2fr; gap:40px; align-items:start; margin-top:40px; flex:1; }
.slide.index .idx-label{ font-family:var(--font-head); font-weight:900; font-size:clamp(40px,5vw,64px); color:var(--ink); }
.slide.index ol.idx{ list-style:none; counter-reset:idx; align-self:center; }
.slide.index ol.idx li{ counter-increment:idx; display:flex; gap:18px; align-items:baseline; padding:16px 4px; border-top:1.5px solid var(--ink); font-size:21px; }
.slide.index ol.idx li:last-child{ border-bottom:1.5px solid var(--ink); }
.slide.index ol.idx li::before{ content:counter(idx) "."; font-family:var(--font-head); font-weight:800; font-size:21px; color:var(--ink); min-width:26px; }

/* 정리 (summary) — 옅은 회색 배경 */
.slide.summary{ background:var(--paper-2); }

/* Q&A / Thanks — 검정 하단 패널 + 좌상단 거대 타이틀 */
.slide.endcard{ padding:0; }
.endcard .white-top{ position:absolute; top:0; left:0; right:0; height:44%; background:#fff; }
.endcard .black-bot{ position:absolute; left:0; right:0; bottom:0; height:56%; background:var(--black); }
.endcard .big{ position:absolute; top:46px; left:var(--pad); font-family:var(--font-head); font-weight:900; font-size:clamp(64px,10vw,128px); line-height:.92; color:var(--ink); letter-spacing:-.02em; z-index:2; }
.endcard .sub{ position:absolute; left:var(--pad); right:var(--pad); top:52%; color:#fff; font-size:18px; line-height:1.6; max-width:64ch; z-index:2; }
.endcard .sub .para,
.endcard .sub .note{ color:rgba(255,255,255,.85); max-width:64ch; }
.endcard .b-top{ position:absolute; top:30px; left:var(--pad); right:var(--pad); display:flex; justify-content:space-between; color:var(--ink); font-family:var(--font-head); font-weight:700; font-size:13px; z-index:3; }
.endcard .b-bot{ position:absolute; bottom:26px; left:var(--pad); right:var(--pad); display:flex; justify-content:space-between; color:rgba(255,255,255,.55); font-family:var(--font-head); font-weight:600; font-size:11px; z-index:3; }

/* =====================================================================
   UI: 언어 토글 · 진행바 · 페이지 표시 · 도움말
   ===================================================================== */
#ui{ position:fixed; inset:0; pointer-events:none; z-index:50; }
.langbar{
  position:fixed; top:16px; left:50%; transform:translateX(-50%);
  display:flex; gap:6px; pointer-events:auto; z-index:60;
}
.langbar button{
  font-family:var(--font-head); font-weight:700; font-size:12px;
  padding:7px 12px; border:1px solid rgba(255,255,255,.35); border-radius:999px;
  background:rgba(0,0,0,.55); color:#fff; cursor:pointer; backdrop-filter:blur(6px);
  transition:all .15s;
}
.langbar button:hover{ background:rgba(0,0,0,.8); }
.langbar button.on{ background:#fff; color:#111; border-color:#fff; }

.progress{ position:fixed; left:0; top:0; height:3px; background:var(--accent); width:0; z-index:60; transition:width .35s ease; }

.pageno{
  position:fixed; bottom:16px; left:20px; pointer-events:auto; z-index:60;
  font-family:var(--font-head); font-weight:700; font-size:12px; color:rgba(255,255,255,.85);
  background:rgba(0,0,0,.45); padding:5px 11px; border-radius:999px; backdrop-filter:blur(6px);
}
.help{
  position:fixed; bottom:16px; right:20px; pointer-events:none; z-index:60;
  font-family:var(--font-head); font-weight:600; font-size:11px; color:rgba(255,255,255,.7);
  background:rgba(0,0,0,.4); padding:5px 11px; border-radius:999px; backdrop-filter:blur(6px);
}

/* 좌우 클릭 영역(보이지 않음) */
.navzone{ position:fixed; top:0; bottom:0; width:14%; z-index:55; cursor:pointer; pointer-events:auto; }
.navzone.prev{ left:0; } .navzone.next{ right:0; }

/* 화살표 버튼(은은하게) */
.arrow{
  position:fixed; top:50%; transform:translateY(-50%); z-index:58; pointer-events:auto;
  width:42px; height:42px; border-radius:50%; border:none; cursor:pointer;
  background:rgba(0,0,0,.4); color:#fff; font-size:20px; line-height:1;
  display:flex; align-items:center; justify-content:center; opacity:0; transition:opacity .2s;
  backdrop-filter:blur(6px);
}
#stage:hover .arrow{ opacity:.8; }
.arrow:hover{ background:rgba(0,0,0,.75); }
.arrow.prev{ left:18px; } .arrow.next{ right:18px; }

@media print{ body{ background:#fff; } .langbar,.help,.arrow,.navzone,.pageno,.progress{ display:none; } }
</style>
</head>
<body>

<div id="stage">
  <div id="deck">
    <!-- 슬라이드는 JS로 렌더 -->
  </div>
</div>

<!-- 브랜드 바는 슬라이드별로 deck 안에 렌더되므로 여기선 비움 -->

<div id="ui">
  <div class="progress" id="progress"></div>
  <div class="langbar" id="langbar"></div>
  <div class="pageno" id="pageno">01 / 27</div>
  <div class="help" id="help"></div>
</div>

<div class="navzone prev" onclick="go(-1)"></div>
<div class="navzone next" onclick="go(1)"></div>

    ${netNode(605,105,12,'#ffd54a')}
    ${netNode(445,210,12,'#7c4dff')}
    ${netNode(610,215,12,'#ff8a3d')}

    <text x="445" y="92"  text-anchor="middle" class="dg-sub" font-size="10.5" fill="#16d2c3">${_esc(t(L.v))}</text>

};

/* ─────────────────────────────────────────────────────────────────

window.DIAGRAMS.reward_weights = function(t, lang){
  const L = {
    org:  {ko:"전사·그룹·팀 성과", en:"Company/group/team", zh:"全公司·组·团队业绩", ja:"全社·グループ·チーム成果"},
    ind:  {ko:"개인 성과·직무 역량", en:"Individual perf. & capability", zh:"个人业绩·职务能力", ja:"個人成果·職務能力"},
    multi:{ko:"다관점·협업·태도·리더십", en:"Multi-persp./collab./attitude/leadership", zh:"多视角·协作·态度·领导力", ja:"多視点·協働·態度·リーダーシップ"},
    ext:  {ko:"기타(외부) 요인", en:"Other (external)", zh:"其他（外部）因素", ja:"その他(外部)要因"}
  };
  // 4구간: 폭(%) 누적
  const segs=[
    {w:50, c:'#111',    lab:L.org,   v:'50%'},
    {w:25, c:'#ff2d8e', lab:L.ind,   v:'20–30%'},
    {w:18, c:'#16d2c3', lab:L.multi, v:'20–30%'},
    {w:7,  c:'#ffb300', lab:L.ext,   v:'0–10%'}
  ];
  const BARX=60, BARW=520, BARY=84, BARH=56;
  let x=BARX, bars='', legend='';
  segs.forEach((s,i)=>{
    const w=BARW*s.w/100;
    bars+=`<rect x="${x.toFixed(1)}" y="${BARY}" width="${w.toFixed(1)}" height="${BARH}" fill="${s.c}"/>`;
    // 50% 처럼 넓은 칸은 안쪽, 좁은 칸은 위쪽에 라벨
    if(w>70){
      bars+=`<text x="${(x+w/2).toFixed(1)}" y="${BARY+BARH/2+6}" text-anchor="middle" class="dg-label" font-size="15" fill="#fff">${s.v}</text>`;
    } else {
      bars+=`<text x="${(x+w/2).toFixed(1)}" y="${BARY-8}" text-anchor="middle" class="dg-label" font-size="12.5" fill="${s.c}">${s.v}</text>`;
      bars+=`<line x1="${(x+w/2).toFixed(1)}" y1="${BARY-4}" x2="${(x+w/2).toFixed(1)}" y2="${BARY+4}" stroke="${s.c}" stroke-width="1.5"/>`;

    const ly=180+i*32;
    legend+=`<rect x="60" y="${ly-12}" width="16" height="16" rx="3" fill="${s.c}"/>
             <text x="86" y="${ly+1}" class="dg-sub" font-size="13" fill="#222">${_esc(t(s.lab))}</text>
             <text x="560" y="${ly+1}" text-anchor="end" class="dg-label" font-size="13" fill="#111">${s.v}</text>`;
    x+=w;
  });
  return `
  <svg viewBox="0 0 620 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="reward weights">

/* ─────────────────────────────────────────────────────────────────

/* ─────────────────────────────────────────────────────────────────
   6) 평가 4단어 비교 — 7~8p
   Assessment / Evaluation / Appraisal / Review 를 '유연성' 축에 배치
   ───────────────────────────────────────────────────────────────── */
window.DIAGRAMS.four_terms = function(t, lang){
  const L = {
    rigid: {ko:"고정적 · 형식 중시", en:"Rigid · format-bound", zh:"固定 · 重形式", ja:"固定的 · 形式重視"},
    flex:  {ko:"유연 · 개선 중심",   en:"Flexible · improvement", zh:"灵活 · 重改进", ja:"柔軟 · 改善中心"},
    a1:{ko:"종합적 정보 수집",  en:"Holistic info-gathering", zh:"综合信息收集", ja:"総合的な情報収集"},
    a2:{ko:"목표·기준 대비 측정", en:"Measure vs. criteria", zh:"对照标准衡量", ja:"基準に対し測定"},
    a3:{ko:"가치 평가 → 의사결정", en:"Valuation → decision", zh:"价值评估→决策", ja:"価値評価→意思決定"},
    a4:{ko:"연속적 피드백 → 개선", en:"Continuous feedback", zh:"持续反馈→改进", ja:"継続的FB→改善"},
    pick:{ko:"제도의 유연성: Review > Assessment · Evaluation · Appraisal",
          en:"Flexibility: Review > Assessment · Evaluation · Appraisal",
          zh:"制度灵活性：Review > Assessment · Evaluation · Appraisal",
          ja:"制度の柔軟性: Review > Assessment · Evaluation · Appraisal"}
  };
  const items=[
    {name:'Assessment', sub:L.a1, c:'#5c7cfa'},
    {name:'Evaluation', sub:L.a2, c:'#7c4dff'},
    {name:'Appraisal',  sub:L.a3, c:'#f06595'},
    {name:'Review',     sub:L.a4, c:'#12b886', star:true}
  ];
  const X0=70, X1=500, Y=110, gap=(X1-X0)/3;
  let dots='';
  items.forEach((it,i)=>{
    const x=X0+gap*i;
    dots+=`<circle cx="${x}" cy="${Y}" r="${it.star?17:13}" fill="${it.c}"/>`;
    if(it.star){ dots+=`<text x="${x}" y="${Y+5}" text-anchor="middle" font-size="15" fill="#fff">★</text>`; }
    dots+=`<text x="${x}" y="${Y-28}" text-anchor="middle" class="dg-label" font-size="14" fill="#222">${_esc(it.name)}</text>`;
    dots+=`<text x="${x}" y="${Y+38}" text-anchor="middle" class="dg-sub" font-size="11" fill="#666">${_esc(t(it.sub))}</text>`;
  });
  return `
  <svg viewBox="0 0 640 230" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="four assessment terms">
    <!-- 축 -->
    <line x1="${X0-20}" y1="${Y}" x2="${X1+20}" y2="${Y}" stroke="#ccc" stroke-width="2"/>
    <text x="${X0-26}" y="${Y+5}" text-anchor="end" class="dg-sub" font-size="11" fill="#999">${_esc(t(L.rigid))}</text>
    <text x="${X1+26}" y="${Y+5}" text-anchor="start" class="dg-sub" font-size="11" fill="#999">${_esc(t(L.flex))}</text>
    ${dots}
    <rect x="70" y="186" width="500" height="30" rx="15" fill="#f2f2f2" stroke="#e3e3e3"/>
    <text x="320" y="205" text-anchor="middle" class="dg-label" font-size="12.5" fill="#111">${_esc(t(L.pick))}</text>
  </svg>`;
};

/* ─────────────────────────────────────────────────────────────────
   7) 3대 구성요소 — 12p
   Self Review + 다관점 + 리더십 → 성장과 발전
   ───────────────────────────────────────────────────────────────── */
window.DIAGRAMS.three_components = function(t, lang){
  const L = {
    self:  {ko:"셀프 리뷰",       en:"Self Review",        zh:"自我回顾",   ja:"セルフレビュー"},
    selfS: {ko:"성과 & 역량 회고", en:"Performance & capability", zh:"成果与能力回顾", ja:"成果·能力の振り返り"},
    multi: {ko:"다관점 피드백",   en:"Multi-Perspective",  zh:"多视角反馈", ja:"多視点フィードバック"},
    multiS:{ko:"협업 동료의 피드백", en:"Feedback from collaborators", zh:"协作同事的反馈", ja:"協働者からのFB"},
    lead:  {ko:"리더십 피드백",   en:"Leadership Feedback", zh:"领导力反馈", ja:"リーダーシップFB"},
    leadS: {ko:"리더에 대한 상향 피드백", en:"Upward feedback on leaders", zh:"对领导的向上反馈", ja:"リーダーへの上向きFB"},
    goal:  {ko:"성장과 발전",     en:"Growth & Development", zh:"成长与发展", ja:"成長と発展"}

  function card(x,c,t1,t2,col){

            <circle cx="${x+24}" cy="60" r="9" fill="${col}"/>
            <text x="${x+85}" y="72" text-anchor="middle" class="dg-label" font-size="15" fill="#222">${_esc(t1)}</text>
            <text x="${x+85}" y="96" text-anchor="middle" class="dg-sub" font-size="10.5" fill="#777">${_esc(t2)}</text>`;
  }
  return `
  <svg viewBox="0 0 640 250" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="three components">
    ${card(20,  0, t(L.self),  t(L.selfS),  '#f06595')}
    ${card(235, 0, t(L.multi), t(L.multiS), '#16d2c3')}

    <!-- 합류 화살표 -->
    <path d="M105 132 C105 175, 320 175, 320 196" fill="none" stroke="#bbb" stroke-width="2"/>
    <path d="M320 132 L320 196" fill="none" stroke="#bbb" stroke-width="2"/>

/* ─────────────────────────────────────────────────────────────────
   8) 평가 → 리뷰 사이클 — 11p
   단방향 통보(과거) vs 목표설정→Check-In→피드백 순환(현재)
   ───────────────────────────────────────────────────────────────── */
window.DIAGRAMS.review_cycle = function(t, lang){
  const L = {
    pastT: {ko:"과거 · 단방향 통보", en:"Past · one-way notice", zh:"过去 · 单向通知", ja:"過去 · 一方向の通知"},
    nowT:  {ko:"현재 · 순환 피드백", en:"Now · continuous loop", zh:"现在 · 循环反馈", ja:"現在 · 循環フィードバック"},
    set:   {ko:"목표 설정",   en:"Set goals",   zh:"设定目标", ja:"目標設定"},
    check: {ko:"수시 Check-In", en:"Check-In",  zh:"随时 Check-In", ja:"随時Check-In"},
    fb:    {ko:"실시간 피드백·코칭", en:"Feedback & coaching", zh:"实时反馈·辅导", ja:"リアルタイムFB·コーチング"},
    rec:   {ko:"동료 Recognition", en:"Peer recognition", zh:"同事Recognition", ja:"同僚Recognition"},
    lead:  {ko:"리더",  en:"Lead", zh:"领导", ja:"リード"},
    member:{ko:"구성원", en:"Member", zh:"成员", ja:"メンバー"},
    verdict:{ko:"연말 평가 통보", en:"Year-end verdict", zh:"年末评价通知", ja:"年末評価の通知"}
  };
  // 우측 순환: 4개 노드를 원형 배치
  const cx=490, cy=180, R=62;
  const nodes=[
    {a:-90, lab:L.set,   c:'#5c7cfa'},
    {a:0,   lab:L.check, c:'#16d2c3'},
    {a:90,  lab:L.fb,    c:'#f06595'},
    {a:180, lab:L.rec,   c:'#ffb300'}
  ];
  let cyc='';
  // 화살표 호 (시계방향)
  cyc+=`<circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="#ddd" stroke-width="2" stroke-dasharray="3 5"/>`;
  nodes.forEach((n,i)=>{
    const rad=n.a*Math.PI/180;
    const x=cx+Math.cos(rad)*R, y=cy+Math.sin(rad)*R;
    cyc+=`<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="10" fill="${n.c}"/>`;
    // 라벨 위치(바깥쪽, 더 멀리)
    const lx=cx+Math.cos(rad)*(R+18), ly=cy+Math.sin(rad)*(R+18);
    const anc = Math.abs(Math.cos(rad))<0.3 ? 'middle' : (Math.cos(rad)>0?'start':'end');
    const dy  = Math.sin(rad)>0.3?15:(Math.sin(rad)<-0.3?-9:4);
    cyc+=`<text x="${lx.toFixed(1)}" y="${(ly+dy).toFixed(1)}" text-anchor="${anc}" class="dg-sub" font-size="10.5" fill="#444">${_esc(t(n.lab))}</text>`;
  });
  // 회전 화살촉
  cyc+=`<path d="M${cx+R-4} ${cy-8} l6 8 l-8 4" fill="none" stroke="#999" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>`;
  return `
  <svg viewBox="0 0 640 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="evaluation vs review cycle">
    <!-- 좌: 과거 단방향 -->
    <rect x="20" y="40" width="270" height="240" rx="14" fill="#f7f7f7" stroke="#e6e6e6"/>
    <text x="155" y="66" text-anchor="middle" class="dg-label" font-size="14" fill="#555">${_esc(t(L.pastT))}</text>
    <rect x="95" y="88" width="120" height="40" rx="8" fill="#9aa0a6"/>
    <text x="155" y="113" text-anchor="middle" class="dg-label" font-size="13" fill="#fff">${_esc(t(L.lead))}</text>
    <path d="M155 132 L155 188" fill="none" stroke="#111" stroke-width="2.5"/>
    <path d="M155 188 l-6 -10 h12 z" fill="#111"/>
    <text x="170" y="165" class="dg-sub" font-size="10.5" fill="#777">${_esc(t(L.verdict))}</text>
    <rect x="95" y="192" width="120" height="40" rx="8" fill="#cfd3d7"/>
    <text x="155" y="217" text-anchor="middle" class="dg-label" font-size="13" fill="#333">${_esc(t(L.member))}</text>

    <!-- 가운데 화살표 -->
    <g transform="translate(305,162)">
      <path d="M-10 0 L12 0 M4 -7 L14 0 L4 7" fill="none" stroke="#111" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- 우: 현재 순환 -->
    <rect x="350" y="40" width="270" height="240" rx="14" fill="#fff" stroke="#e6e6e6"/>
    <text x="485" y="66" text-anchor="middle" class="dg-label" font-size="14" fill="#111">${_esc(t(L.nowT))}</text>
    ${cyc}
  </svg>`;
};
</script>

  wrap: `<svg viewBox="0 0 520 980" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
    <defs>

        <stop offset="0%" stop-color="#fff0f6"/>

        <stop offset="0%" stop-color="#ff2d8e" stop-opacity="0.28"/>

      </radialGradient>
    </defs>
    <rect width="520" height="980" fill="url(#wbg)"/>
    <rect width="520" height="980" fill="url(#wbloom)"/>
    <!-- three check rows = wrapped up items -->
    <g transform="translate(150 330)">
      <g>
        <circle cx="0" cy="0" r="34" fill="#16d2c3"/>
        <path d="M-15,2 L-4,14 L18,-12" fill="none" stroke="#fff" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
        <rect x="60" y="-9" width="150" height="18" rx="9" fill="#111" opacity="0.18"/>
      </g>
      <g transform="translate(0 110)">
        <circle cx="0" cy="0" r="34" fill="#ff2d8e"/>
        <path d="M-15,2 L-4,14 L18,-12" fill="none" stroke="#fff" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
        <rect x="60" y="-9" width="150" height="18" rx="9" fill="#111" opacity="0.18"/>
      </g>
      <g transform="translate(0 220)">
        <circle cx="0" cy="0" r="34" fill="#16d2c3"/>
        <path d="M-15,2 L-4,14 L18,-12" fill="none" stroke="#fff" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
        <rect x="60" y="-9" width="120" height="18" rx="9" fill="#111" opacity="0.18"/>
      </g>
    </g>
  </svg>`
};

window.BADGE_SVG = {
  // 화룡점정 — the finishing dot: a brush-stroke ring with a final accent dot
  finishing_dot: `<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <radialGradient id="bd1" cx="50%" cy="50%" r="55%">
        <stop offset="0%" stop-color="#ff2d8e" stop-opacity="0.18"/>
        <stop offset="100%" stop-color="#ff2d8e" stop-opacity="0"/>
      </radialGradient>
      <linearGradient id="bd2" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#16d2c3"/>
        <stop offset="100%" stop-color="#ff2d8e"/>
      </linearGradient>
    </defs>
    <circle cx="100" cy="100" r="92" fill="url(#bd1)"/>
    <!-- open brush ring, gap at top-right like a calligraphic stroke -->
    <path d="M150 58 A 70 70 0 1 0 156 120" fill="none" stroke="url(#bd2)"
          stroke-width="12" stroke-linecap="round"/>
    <!-- the final dot (the 'eye') -->
    <circle cx="150" cy="50" r="15" fill="#ff2d8e"/>
    <circle cx="150" cy="50" r="6" fill="#fff" opacity="0.9"/>
  </svg>`
};

function imgURL(key){
  if(!key) return '';
  // 로고는 PNG(투명배경), 나머지 그래픽은 JPG
  const isPng = key.indexOf('logo_')===0;
  const ext = isPng ? 'png' : 'jpg';
  const mime = isPng ? 'image/png' : 'image/jpeg';
  // 단일 파일 모드면 임베드된 base64, 아니면 외부 파일(assets/)
  if(window.ASSET_MODE==='inline' && ASSETS[key]) return 'data:'+mime+';base64,'+ASSETS[key];
  return 'assets/'+key+'.'+ext;
}

/* ---- 본문 블록 렌더 ----
   reveal 모드에서는 "노출 단위"마다 data-rev="N"을 부여한다.
   단위 규칙:
   - list/olist  → 각 항목(li) 단위
   - table       → 각 본문 행(tr) 단위 (단, revealCols:true 면 열 단위)
   - vs          → 왼쪽 카드 / 오른쪽 카드 각각 1단위
   - 그 외(p, lead, bighead, note, callout, quote, diagram) → 블록 통째 1단위
*/
let _rev = 0;                     // 슬라이드별 reveal 카운터
function revWrap(html){ return `<div class="rev-item" data-rev="${_rev++}">${html}</div>`; }

function renderBlocks(blocks, reveal){
  if(!blocks) return '';
  _rev = 0;
  return blocks.map(b=>{
    // 세분화 단위가 있는 블록은 전용 렌더러가 직접 data-rev를 부여
    if(reveal && b.list)   return `<ul class="list">${b.list.map(x=>revWrap(`<li>${nl2br(t(x))}</li>`)).join('')}</ul>`;
    if(reveal && b.olist)  return `<ol class="olist">${b.olist.map(x=>revWrap(`<li>${nl2br(t(x))}</li>`)).join('')}</ol>`;
    if(reveal && b.table)  return renderTable(b.table, true);
    if(reveal && b.vs)     return renderVS(b.vs, true);

    let html='';
    if(b.p)           html=`<p class="para">${nl2br(t(b.p))}</p>`;
    else if(b.lead)   html=`<p class="lead">${nl2br(t(b.lead))}</p>`;
    else if(b.bighead)html=`<p class="bighead">${nl2br(t(b.bighead))}</p>`;
    else if(b.note)   html=`<p class="note${b.note.wide?' wide':''}">${nl2br(t(b.note))}</p>`;
    else if(b.quote)  html=`<blockquote class="q">${nl2br(t(b.quote))}</blockquote>`;
    else if(b.list)   html=`<ul class="list">${b.list.map(x=>`<li>${nl2br(t(x))}</li>`).join('')}</ul>`;
    else if(b.olist)  html=`<ol class="olist">${b.olist.map(x=>`<li>${nl2br(t(x))}</li>`).join('')}</ol>`;
    else if(b.callout)html=`<div class="callout"><span class="ico">${b.callout.icon||'•'}</span><span>${nl2br(t(b.callout.text))}</span></div>`;
    else if(b.table)  html=renderTable(b.table);
    else if(b.vs)     html=renderVS(b.vs);
    else if(b.diagram)html=renderDiagram(b.diagram);
    else return '';
    return reveal ? revWrap(html) : html;
  }).join('');
}
/* ---- 다이어그램(직접 그린 SVG) 렌더 ----
   b.diagram = { kind:"johari", caption:{ko,..}, max:680 }
   kind 에 맞는 SVG 생성 함수를 호출. 라벨은 함수 내부에서 4개 언어 전환. */
function renderDiagram(d){
  const fn = (window.DIAGRAMS && window.DIAGRAMS[d.kind]);
  if(!fn) return `<div class="diagram-missing">[diagram: ${d.kind} 없음]</div>`;
  const svg = fn(t, lang);     // t(): 언어 픽업 헬퍼, lang: 현재 언어
  const cap = d.caption ? `<figcaption class="diagram-cap">${nl2br(t(d.caption))}</figcaption>` : '';
  const mw  = d.max ? `style="max-width:${d.max}px"` : '';
  return `<figure class="diagram" ${mw}>${svg}${cap}</figure>`;
}
function renderTable(tb, reveal){
  const nw = tb.nowrapCols || [];
  const cls = (i)=> nw.includes(i) ? ' nowrapcol' : '';
  if(reveal && tb.revealCols){
    // 열 단위 노출: 각 열(헤더+해당 열 셀들)에 동일한 data-rev 부여
    const ncol = tb.head.length;
    const colRev = tb.head.map(()=> _rev++);   // 열마다 reveal 인덱스 미리 할당
    const head = `<tr>${tb.head.map((h,i)=>`<th class="rev-cell${cls(i)}" data-rev="${colRev[i]}">${nl2br(t(h))}</th>`).join('')}</tr>`;
    const rows = tb.rows.map(r=>`<tr>${r.map((c,i)=>`<td class="rev-cell${cls(i)}" data-rev="${colRev[i]}">${nl2br(t(c))}</td>`).join('')}</tr>`).join('');
    return `<table class="tbl wrapfirst reveal-cols"><thead>${head}</thead><tbody>${rows}</tbody></table>`;
  }
  const clsAttr = (i)=> nw.includes(i) ? ' class="nowrapcol"' : '';
  const head = `<tr>${tb.head.map((h,i)=>`<th${clsAttr(i)}>${nl2br(t(h))}</th>`).join('')}</tr>`;
  if(reveal){
    // 행 단위 노출: 헤더행 1스텝 + 각 본문행 1스텝
    const headRev = _rev++;
    const theadRow = `<tr class="rev-row" data-rev="${headRev}">${tb.head.map((h,i)=>`<th${clsAttr(i)}>${nl2br(t(h))}</th>`).join('')}</tr>`;
    const rows = tb.rows.map(r=>`<tr class="rev-row" data-rev="${_rev++}">${r.map((c,i)=>`<td${clsAttr(i)}>${nl2br(t(c))}</td>`).join('')}</tr>`).join('');
    return `<table class="tbl wrapfirst reveal-rows"><thead>${theadRow}</thead><tbody>${rows}</tbody></table>`;
  }
  const rows = tb.rows.map(r=>`<tr>${r.map((c,i)=>`<td${clsAttr(i)}>${nl2br(t(c))}</td>`).join('')}</tr>`).join('');
  return `<table class="tbl wrapfirst"><thead>${head}</thead><tbody>${rows}</tbody></table>`;
}
function renderVS(vs, reveal){
  const card=(side,c)=>`<div class="card ${side}">
      <div class="head">${nl2br(t(c.label))}</div>
      <ul class="items">${c.items.map(x=>`<li>${nl2br(t(x))}</li>`).join('')}</ul>
    </div>`;
  if(reveal){
    // 왼쪽 카드 1스텝, 오른쪽 카드 1스텝
    const l = `<div class="rev-item" data-rev="${_rev++}">${card('l',vs.left)}</div>`;
    const r = `<div class="rev-item" data-rev="${_rev++}">${card('r',vs.right)}</div>`;
    return `<div class="vs">${l}${r}</div>`;
  }
  return `<div class="vs">${card('l',vs.left)}${card('r',vs.right)}</div>`;
}

/* ---- 상단 우측 로고 (Spoon + VIGLOO 이미지) ---- */
function brandLogos(){
  return `<span class="brand-logos">
      <img class="logo-spoon" src="${imgURL('logo_spoon')}" alt="Spoon">
      <img class="logo-vigloo" src="${imgURL('logo_vigloo')}" alt="VIGLOO">
    </span>`;
}

/* ---- 브랜드 바 (슬라이드 내부) ---- */
function brandBars(dark){
  return `
    <div class="brand-top"><span>${META.brandLeft}</span>${brandLogos()}</div>`;
}

/* ---- 슬라이드 1장 렌더 ---- */
function renderSlide(s, idx){
  const dark = (s.type==='cover' || s.type==='qa' || s.type==='thanks');
  const el = document.createElement('section');
  el.className = 'slide ' + s.type + ((s.img||s.svg)? ' has-img':'') + (dark?' on-black':'') + (s.fullTitle? ' full-title':'');
  el.dataset.idx = idx;

  // ── 레이아웃 분기 ──
  if(s.type==='cover'){
    el.innerHTML = `
      <div class="top-black">
        <div class="montage" style="background-image:url('${imgURL(s.img)}')"></div>
        <div class="b-top"><span>${META.brandLeft}</span>${brandLogos()}</div>
      </div>
      <div class="bottom-white">
        ${s.eyebrow?`<div class="c-eyebrow">${nl2br(t(s.eyebrow))}</div>`:''}
        <h1 class="cover-title">${t(s.title).split('\n').map(l=>`<span class="br">${l}</span>`).join('')}</h1>
      </div>`;
    return el;
  }

  if(s.type==='qa' || s.type==='thanks'){
    el.classList.add('endcard');
    el.innerHTML = `
      <div class="white-top"></div>
      <div class="black-bot"></div>
      <div class="b-top"><span>${META.brandLeft}</span>${brandLogos()}</div>
      <div class="big">${t(s.title)}</div>
      <div class="sub">${renderBlocks(s.body)}</div>`;
    return el;
  }

  if(s.type==='index'){
    el.innerHTML = `
      ${brandBars()}
      <div class="index-grid">
        <div class="idx-label">${t(s.title)}</div>
        <ol class="idx">${(s.body[0].olist||[]).map(x=>`<li>${nl2br(t(x))}</li>`).join('')}</ol>
      </div>`;
    return el;
  }

  // 공통 콘텐츠형 (content / split / intro / summary)
  const header = `
    ${s.eyebrow?`<div class="eyebrow">${nl2br(t(s.eyebrow))}</div>`:''}
    <div class="num-title">
      ${s.num?`<span class="num">${s.num}</span>`:''}
      <h1 class="title">${t(s.title).split('\n').map(l=>`<span class="br">${l}</span>`).join('')}</h1>
    </div>`;

  el.innerHTML = `
    ${brandBars()}
    ${s.svg?`<div class="gfx gfx-svg">${(window.GFX_SVG&&window.GFX_SVG[s.svg])||''}<div class="fade"></div></div>`:(s.img?`<div class="gfx"><div class="bg" style="background-image:url('${imgURL(s.img)}')"></div><div class="fade"></div></div>`:'')}
    ${s.badge?`<div class="corner-badge">${(window.BADGE_SVG&&window.BADGE_SVG[s.badge])||''}</div>`:''}
    ${header}
    <div class="content-wrap">${renderBlocks(s.body, true)}</div>`;
  el.dataset.reveal = '1';
  return el;
}

/* ---- 전체 빌드 ---- */
function build(keepRev){
  const savedRev = revIdx;
  deck.innerHTML='';
  SLIDES.forEach((s,i)=>{ deck.appendChild(renderSlide(s,i)); });
  buildLangbar();
  show(cur);
  if(keepRev){
    revIdx = Math.min(savedRev, revCount());
    applyReveal();
  }
  fitStage();
}

/* ---- 언어바 ---- */
function buildLangbar(){
  const bar=document.getElementById('langbar');
  bar.innerHTML = META.langs.map(l=>`<button data-lang="${l.id}" class="${l.id===lang?'on':''}" onclick="setLang('${l.id}')">${l.label}</button>`).join('');
}
function setLang(l){
  lang=l; localStorage.setItem('deck_lang',l);
  document.documentElement.lang = (l==='ja'?'ja':l==='zh'?'zh':l==='en'?'en':'ko');
  build(true);           // 재렌더 (현재 슬라이드 + 노출 단계 유지)
}

/* ---- 슬라이드 전환 ---- */
function revEl(){
  return [...deck.children].find(c=>+c.dataset.idx===cur) || null;
}
function revItems(){
  const el=revEl();
  if(!el || !el.dataset.reveal) return [];
  return [...el.querySelectorAll('[data-rev]')];
}
function revCount(){
  // 고유 노출 단계 수 = (가장 큰 data-rev 값)+1
  const items=revItems();
  let mx=-1;
  items.forEach(it=>{ const v=+it.dataset.rev; if(v>mx) mx=v; });
  return mx+1;
}
function applyReveal(){
  // data-rev 값이 revIdx 미만이면 노출
  revItems().forEach(it=> it.classList.toggle('shown', (+it.dataset.rev) < revIdx));
}
function show(i, fromEnd){
  cur=Math.max(0,Math.min(SLIDES.length-1,i));
  [...deck.children].forEach(c=>c.classList.toggle('active', +c.dataset.idx===cur));
  // 앞으로 진입: 타이틀만(본문은 클릭부터) / 뒤로 진입: 전부 노출
  revIdx = fromEnd ? revCount() : 0;
  applyReveal();
  // 다크 여부에 따라 body 클래스(브랜드 바 색 등)
  const s=SLIDES[cur];
  document.body.classList.toggle('dark', s.type==='cover'||s.type==='qa'||s.type==='thanks'||s.type==='summary'?false:false);
  // 진행바/페이지
  document.getElementById('progress').style.width = ((cur)/(SLIDES.length-1)*100)+'%';
  const pad=n=>String(n).padStart(2,'0');
  document.getElementById('pageno').textContent = `${pad(cur+1)} / ${pad(SLIDES.length)}`;
  document.getElementById('help').textContent = t(META.ui.help);
}
/* 앞으로(+1): 남은 노출 단계가 있으면 하나 더, 없으면 다음 슬라이드
   뒤로(-1): 노출 단계가 남아 있으면 하나 줄이고, 아니면 이전 슬라이드(전부 노출) */
function go(d){
  if(d>0){
    if(revIdx < revCount()){ revIdx++; applyReveal(); return; }
    show(cur+1);
  } else {
    if(revCount() && revIdx > 0){ revIdx--; applyReveal(); return; }
    show(cur-1, true);
  }
}

/* ---- 키보드 ---- */
window.addEventListener('keydown', e=>{
  if(e.key==='ArrowRight'||e.key==='PageDown'||e.key===' ') { e.preventDefault(); go(1); }
  else if(e.key==='ArrowLeft'||e.key==='PageUp') { e.preventDefault(); go(-1); }
  else if(e.key==='Home'){ show(0); }
  else if(e.key==='End'){ show(SLIDES.length-1); }
  else if(e.key.toLowerCase()==='f'){ toggleFS(); }
  else if(['1','2','3','4'].includes(e.key)){ const L=META.langs[+e.key-1]; if(L) setLang(L.id); }
});
function toggleFS(){
  if(!document.fullscreenElement){ document.documentElement.requestFullscreen?.(); }
  else { document.exitFullscreen?.(); }
}

/* ---- 본문(가운데) 클릭: 다음 블록/슬라이드 ---- */
deck.addEventListener('click', e=>{
  // 링크 등 인터랙션 요소는 제외
  if(e.target.closest('a, button')) return;
  go(1);
});

/* ---- 무대 스케일 (16:9 유지) ---- */
function fitStage(){
  const W=window.innerWidth, H=window.innerHeight;
  const scale=Math.min(W/1280, H/720);
  deck.style.transform=`scale(${scale})`;
}
window.addEventListener('resize', fitStage);

/* 터치 스와이프 */
let tx=0;
window.addEventListener('touchstart',e=>{ tx=e.changedTouches[0].clientX; },{passive:true});
window.addEventListener('touchend',e=>{ const dx=e.changedTouches[0].clientX-tx; if(Math.abs(dx)>50) go(dx<0?1:-1); },{passive:true});

/* 시작: 이미지 디코드 후 빌드 (배경 이미지가 첫 페인트에 확실히 나오도록) */
function preloadAssets(){
  const keys=Object.keys(ASSETS||{});
  return Promise.all(keys.map(k=>new Promise(res=>{
    const im=new Image(); im.onload=res; im.onerror=res; im.src=imgURL(k);
  })));
}
preloadAssets().then(build);
</script>
